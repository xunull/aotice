name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# 官方 Pages 并发组;不取消进行中的部署(避免半成品站点)
concurrency:
  group: pages
  cancel-in-progress: false

# 顶层最小权限;部署所需的 pages/id-token 只给 deploy job
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (full workspace)
        run: npm ci

      # 部署前拦共享包(@aotice/compaction-model)回归——计算器用它算 EOQ
      - name: Test shared model via CLI suite
        run: npm test -w aotice

      - name: Build calculator
        run: npm run build:calculator

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/compaction-calculator/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # main 守卫:workflow_dispatch 默认可从任意分支运行,防止把未合并分支发到生产
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      # 部署后冒烟:构建绿只证明文件传上去了,不证明网址真能打开
      - name: Smoke check deployed page
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "smoke-checking $URL"
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/page.html -w '%{http_code}' "$URL" || echo 000)
            if [ "$code" = "200" ] && grep -q 'id="chart"' /tmp/page.html; then
              echo "OK: HTTP 200 and page markup present"
              exit 0
            fi
            echo "attempt $i: code=$code, retrying in 10s..."
            sleep 10
          done
          echo "::error::deployed page smoke check failed ($URL)"
          exit 1
